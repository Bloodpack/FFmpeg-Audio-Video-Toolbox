name: Build Windows EXE with Auto-Versioning

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 

    # REPARATUR: Verhindert den Exit-Code-1 Abbruch durch Stummschaltung des Fehlerkanals auf PowerShell-Ebene
    - name: Calculate Next Version Tag
      id: calculate_tag
      shell: powershell
      run: |
        # Verhindert, dass native Fehlerkanäle (Stderr) zum Abbruch führen
        $ErrorActionPreference = 'SilentlyContinue'
        
        $latestTag = "v1.0.0"
        
        # Git-Befehl absolut sicher ausführen
        if (git tag) {
            $gitOut = git describe --tags --abbrev=0 2>$null
            if ($gitOut -and $gitOut -match 'v\d+') {
                $latestTag = $gitOut.Trim()
            }
        }
        
        # Version aufsplitten und die letzte Ziffer (Patch) erhöhen
        if ($latestTag -match 'v(\d+)\.(\d+)\.(\d+)') {
            $major = [int]$Matches[1]
            $minor = [int]$Matches[2]
            $patch = [int]$Matches[3] + 1
            $newTag = "v$major.$minor.$patch"
            $versionClean = "$major.$minor.$patch.0"
        } else {
            $newTag = "v1.0.1"
            $versionClean = "1.0.1.0"
        }
        
        Write-Host "Naechste Version berechnet: $newTag"
        
        # Werte sicher an die naechsten Schritte uebergeben
        "new_tag=$newTag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        "version_clean=$versionClean" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

    - name: Install PS2EXE Compiler
      shell: powershell
      run: |
        Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope Process -Force
        Install-Module -Name ps2exe -Scope CurrentUser -Force

    - name: Compile PowerShell Script to EXE
      shell: powershell
      run: |
        ps2exe -inputFile ".\FFmpeg_Toolbox.ps1" -outputFile ".\FFmpeg_Toolbox_${{ steps.calculate_tag.outputs.new_tag }}.exe" -title "FFmpeg Audio Video Toolbox" -description "FFmpeg Audio Video Toolbox ${{ steps.calculate_tag.outputs.new_tag }}" -productVersion "${{ steps.calculate_tag.outputs.new_tag }}" -fileVersion "${{ steps.calculate_tag.outputs.version_clean }}"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.calculate_tag.outputs.new_tag }}
        name: Release ${{ steps.calculate_tag.outputs.new_tag }}
        body: |
          Automatischer Windows-Build fuer Version ${{ steps.calculate_tag.outputs.new_tag }}.
          Alle Aenderungen aus dem letzten Code-Push wurden erfolgreich einkompiliert.
        draft: false
        prerelease: false
        files: |
          .\FFmpeg_Toolbox_${{ steps.calculate_tag.outputs.new_tag }}.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

