name: Build Windows EXE with Auto-Versioning & Icon

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 

    - name: Calculate Next Version Tag
      id: calculate_tag
      shell: powershell
      run: |
        $ErrorActionPreference = 'SilentlyContinue'
        $latestTag = "v1.0.0"
        
        if (git tag) {
            $gitOut = git describe --tags --abbrev=0 2>$null
            if ($gitOut -and $gitOut -match 'v\d+') {
                $latestTag = $gitOut.Trim()
            }
        }
        
        if ($latestTag -match 'v(\d+)\.(\d+)\.(\d+)') {
            $major = [int]$Matches
            $minor = [int]$Matches
            $patch = [int]$Matches + 1
            $newTag = "v$major.$minor.$patch"
            $versionClean = "$major.$minor.$patch.0"
        } else {
            $newTag = "v1.0.1"
            $versionClean = "1.0.1.0"
        }
        
        Write-Host "Naechste Version berechnet: $newTag"
        "new_tag=$newTag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        "version_clean=$versionClean" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

    - name: Install PS2EXE Compiler
      shell: powershell
      run: |
        Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope Process -Force
        Install-Module -Name ps2exe -Scope CurrentUser -Force

    - name: Compile PowerShell Script to EXE
      shell: powershell
      run: |
        # Direktes Einbetten des hochgeladenen video_convert.ico über den -icon Parameter
        ps2exe -inputFile ".\FFmpeg_Toolbox.ps1" -outputFile ".\FFmpeg_Toolbox_${{ steps.calculate_tag.outputs.new_tag }}.exe" -title "FFmpeg Audio Video Toolbox" -description "FFmpeg Audio Video Toolbox ${{ steps.calculate_tag.outputs.new_tag }}" -version "${{ steps.calculate_tag.outputs.version_clean }}" -company "Horst Zimmermann" -noConsole -icon ".\video_convert.ico"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.calculate_tag.outputs.new_tag }}
        name: Release ${{ steps.calculate_tag.outputs.new_tag }}
        body: |
          Automatischer Windows-Build fuer Version ${{ steps.calculate_tag.outputs.new_tag }}.
          In diesem Release wurde das native Icon video_convert.ico erfolgreich in die Anwendung integriert.
        draft: false
        prerelease: false
        files: |
          .\FFmpeg_Toolbox_${{ steps.calculate_tag.outputs.new_tag }}.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
